<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hardware Debugging Agent</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar glass-panel">
            <h2>Sessions</h2>
            <button id="new-chat-btn" class="btn primary-btn" style="margin-bottom: 1rem;">+ New Chat</button>
            <div id="session-list" class="session-list">
                <!-- Session items will be dynamically added here -->
            </div>
            
            <hr style="border: 0; border-top: 1px solid var(--glass-border); margin: 1rem 0;">
            
            <div class="connection-header" id="conn-toggle-header" style="display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none;">
                <h2>Connection</h2>
                <span id="conn-toggle-icon" style="transition: transform 0.3s; font-size: 1.2rem;">▼</span>
            </div>
            
            <div id="connection-wrapper" class="connection-wrapper">
                <div class="tabs">
                    <button class="tab-btn active" data-type="ssh">SSH</button>
                    <button class="tab-btn" data-type="serial">Serial</button>
                </div>
                
                <form id="connect-form" class="active-form">
                    <!-- SSH Form -->
                    <div id="ssh-fields" class="form-fields ssh-fields active">
                        <input type="text" id="ssh-host" placeholder="Host IP (e.g. 192.168.1.1)" required>
                        <input type="text" id="ssh-username" placeholder="Username" required>
                        <input type="password" id="ssh-password" placeholder="Password (Optional)">
                        <input type="number" id="ssh-port" placeholder="Port" value="22" required>
                    </div>
                    <!-- Serial Form -->
                    <div id="serial-fields" class="form-fields serial-fields" style="display: none;">
                        <input type="text" id="serial-port" placeholder="COM Port / dev/tty">
                        <input type="number" id="serial-baudrate" placeholder="Baudrate" value="115200">
                    </div>
                    
                    <button type="submit" class="btn primary-btn" id="connect-btn">Connect</button>
                </form>
                <button id="disconnect-btn" class="disconnect-btn">Disconnect from Device</button>
            </div>
            <div id="conn-status" class="status-indicator">Disconnected</div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-area">
            <header class="chat-header glass-panel">
                <h1 id="chat-title">Hardware Agent Console</h1>
                <span id="agent-status" class="badge idle">Ready</span>
            </header>
            
            <div class="message-feed" id="message-feed">
                <div class="welcome-message">
                    Welcome. Connect to a device to begin debugging.
                </div>
            </div>
            
            <div class="chat-input-area glass-panel">
                <form id="chat-form" style="display: flex; gap: 0.5rem; width: 100%;">
                    <input type="text" id="chat-input" placeholder="Describe your hardware issue..." autocomplete="off" disabled>
                    <button type="submit" id="send-btn" class="btn primary-btn" disabled>Send</button>
                    <button type="button" id="stop-btn" class="btn danger-btn" style="display: none; width: auto; padding: 0 1.5rem;" title="Stop Execution">■</button>
                </form>
            </div>
        </main>
    </div>

    <!-- Password Modal -->
    <div id="password-modal" class="modal-overlay">
        <div class="modal glass-panel">
            <h3>🔑 Authentication Required</h3>
            <p id="password-prompt-text">The remote system is requesting a password:</p>
            <form id="password-form">
                <input type="password" id="modal-password" placeholder="Enter password" autocomplete="off" required>
                <button type="submit" class="btn danger-btn">Submit</button>
            </form>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
